<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANARK Research Survey</title>
  <link rel="icon" type="image/png" href="/public/anark logo 1323.png">
  <meta name="description" content="Contribute to AI, Robotics and Biomedical research in Africa.">

  <style>
    :root {
      --bg-dark: #0a0a0a;
      --bg-card: rgba(15, 15, 15, 0.95);
      --text-primary: #f0f0f0;
      --text-secondary: #d0d0d0;
      --gold: #c9a037;
      --gold-dark: #b8962e;
      --gold-glow: #d4af37;
      --border-dark: #2a2a2a;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, Arial, sans-serif;
      background: var(--bg-dark) url('anark_background.jpg') no-repeat center center fixed;
      background-size: cover;
      color: var(--text-primary);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      line-height: 1.6;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 10, 0.75);
      z-index: -1;
    }

    .container {
      max-width: 680px;
      margin: 40px auto;
      background: var(--bg-card);
      border: 1px solid var(--border-dark);
      border-radius: 16px;
      padding: 40px 30px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
    }

    h1 {
      text-align: center;
      color: var(--gold);
      font-size: 2.4rem;
      margin: 0 0 8px 0;
      text-shadow: 0 0 20px var(--gold-glow);
    }

    .subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 1.1rem;
      margin-bottom: 30px;
    }

    /* AI Fact */
    #aiFact {
      background: rgba(30, 30, 30, 0.8);
      border: 1px solid var(--gold-dark);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 30px;
      font-style: italic;
      color: var(--text-secondary);
      text-align: center;
      font-size: 1.02rem;
      box-shadow: 0 4px 15px rgba(201, 160, 55, 0.15);
    }

    /* Progress */
    #sectionIndicator {
      font-weight: 600;
      text-align: center;
      color: var(--gold);
      margin-bottom: 8px;
      font-size: 1.05rem;
    }

    #progressContainer {
      background: #222;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 35px;
    }

    #progressBar {
      background: linear-gradient(90deg, var(--gold), var(--gold-glow));
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    /* Questions */
    .question {
      margin-bottom: 32px;
    }

    .question-label {
      font-weight: 600;
      display: block;
      margin-bottom: 10px;
      color: var(--text-primary);
      font-size: 1.08rem;
    }

    input[type="text"], 
    input[type="email"], 
    input[type="number"], 
    select, 
    textarea {
      width: 100%;
      padding: 14px 16px;
      background: #111;
      border: 1px solid var(--border-dark);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201, 160, 55, 0.25);
    }

    /* Radio & Checkbox */
    .option-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.02rem;
    }

    /* Navigation Buttons */
    #navButtons {
      display: flex;
      justify-content: space-between;
      margin-top: 40px;
      gap: 15px;
    }

    button {
      padding: 14px 28px;
      font-size: 1.05rem;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    #prevBtn {
      background: #222;
      color: var(--text-secondary);
    }

    #nextBtn, #submitBtn {
      background: linear-gradient(45deg, var(--gold), #d4af37, var(--gold-dark));
      color: #111;
    }

    button:hover {
      transform: translateY(-2px);
    }

    #nextBtn:hover, #submitBtn:hover {
      box-shadow: 0 8px 20px rgba(201, 160, 55, 0.5);
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 60px;
      opacity: 0.85;
      font-size: 0.95rem;
    }

    .mgbdk-logo {
      width: 45px;
      margin: 15px auto 0;
      display: block;
      transition: all 0.3s ease;
    }

    .mgbdk-logo:hover {
      transform: scale(1.25);
      filter: drop-shadow(0 0 12px var(--gold));
    }

    @media (max-width: 600px) {
      .container {
        padding: 30px 20px;
        margin: 20px auto;
      }
      h1 { font-size: 2.1rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>ANARK Research Survey</h1>
  <p class="subtitle">Help shape the future of AI, Robotics & Biomedical research in Africa</p>

  <div id="aiFact">
    Fun AI Fact: Artificial Intelligence can help doctors detect diseases earlier.
  </div>

  <div id="sectionIndicator">Section 1 of 5</div>
  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <form id="surveyForm">
    <div id="questions"></div>
    <div id="navButtons">
      <button type="button" id="prevBtn">← Previous</button>
      <button type="button" id="nextBtn">Next →</button>
      <button type="button" id="submitBtn" style="display:none;">Submit Survey</button>
    </div>
  </form>
</div>

<footer>
  <p><strong>© 2026 ANARK — African Network for AI, Robotics & Knowledge</strong></p>
  <p>Powered by MGBDK STEM & AI Research Initiative</p>
  <img src="MGBDK.PNG" class="mgbdk-logo" alt="MGBDK Logo" loading="lazy">
</footer>

<script src="survey.js"></script>

<script>
// AI Fact Rotator
const facts = [
  "AI can detect diseases earlier than doctors in many cases.",
  "Machine learning models improve significantly with diverse, high-quality datasets.",
  "Nigeria has one of the fastest growing tech ecosystems in Africa.",
  "Transformer models are the foundation of modern AI systems like ChatGPT.",
  "Robotics and AI are being used to solve real challenges in agriculture and healthcare."
];

const factBox = document.getElementById("aiFact");

setInterval(() => {
  const randomFact = facts[Math.floor(Math.random() * facts.length)];
  factBox.style.opacity = 0;

  setTimeout(() => {
    factBox.innerText = "Fun AI Fact: " + randomFact;
    factBox.style.opacity = 1;
  }, 400);
}, 7500);
</script>

</body>
</html>
