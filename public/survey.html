<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Research Survey</title>

<style>

body{
font-family:Arial;
background:#000;
color:#f5f5f5;
margin:0;
padding:20px;
max-width:480px;
margin:auto;
}

/* ===== TITLE ===== */

h2{
text-align:center;
color:#d4af37;
}

/* ===== FACT ===== */

#aiFact{
background:#111;
padding:12px;
border-radius:8px;
margin-bottom:20px;
border:1px solid #d4af37;
font-style:italic;
}

/* ===== PROGRESS ===== */

#sectionIndicator{
font-weight:bold;
margin-bottom:6px;
text-align:center;
}

#progressContainer{
background:#333;
border-radius:10px;
height:18px;
margin-bottom:20px;
}

#progressBar{
background:#d4af37;
height:100%;
width:0%;
border-radius:10px;
transition:.3s;
}

/* ===== QUESTIONS ===== */

.question{
margin-bottom:15px;
}

input,select,textarea{
width:100%;
padding:12px;
font-size:16px;
margin-top:8px;
border-radius:8px;
border:none;
}

/* ===== BUTTONS ===== */

button{
padding:12px;
border:none;
border-radius:8px;
background:#d4af37;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#f1d06b;
}

#navButtons{
display:flex;
justify-content:space-between;
margin-top:20px;
}

/* ===== FOOTER ===== */

footer{
margin-top:50px;
text-align:center;
opacity:.8;
}

footer img{
width:30px;
margin-top:8px;
}

</style>
</head>

<body>

<h2>AI Research Survey</h2>

<div id="aiFact">
Fun AI Fact: Artificial Intelligence can help doctors detect diseases earlier.
</div>

<div id="sectionIndicator">Section 1 of 1</div>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<form id="surveyForm">

<div id="questions"></div>

<div id="navButtons"></div>

</form>

<footer>

<p>© 2026 Nigerian AI Research Initiative</p>
<p>Powered by MGBDK</p>

<img src="IMG-20251226-WA0008.jpg">

</footer>

<script src="survey.js"></script>

<script>

const facts=[
"AI can detect diseases earlier than doctors in some cases.",
"Machine learning improves with larger datasets.",
"Nigeria's tech sector is one of Africa's fastest growing.",
"AI is used in robotics, finance, medicine and engineering.",
"Transformer models power modern AI systems."
];

const factBox=document.getElementById("aiFact");

setInterval(()=>{
const fact=facts[Math.floor(Math.random()*facts.length)];
factBox.innerText="Fun AI Fact: "+fact;
},8000);

</script>

</body>
</html>
