<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Research Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */

body{
font-family:Arial,sans-serif;
background:#000;
color:#f5f5f5;
margin:0;
padding:20px;
text-align:center;
}

h1{
color:#d4af37;
margin-bottom:30px;
}

/* ===== STAT CARDS ===== */

.stat-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
max-width:900px;
margin:auto;
margin-bottom:40px;
}

.stat-card{
background:#111;
border:1px solid #333;
padding:20px;
border-radius:10px;
}

.stat-card h3{
margin:0;
color:#d4af37;
font-size:16px;
}

.stat-card p{
font-size:28px;
margin-top:10px;
}

/* ===== CHART GRID ===== */

.dashboard-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
max-width:1000px;
margin:auto;
}

/* ===== CHART CARDS ===== */

.chart-card{
background:#111;
padding:20px;
border-radius:10px;
border:1px solid #333;
}

.chart-card h3{
margin-top:0;
color:#d4af37;
}

canvas{
max-width:100%;
}

/* ===== FOOTER ===== */

footer{
margin-top:40px;
padding-top:20px;
border-top:1px solid #d4af37;
}

footer img{
width:35px;
margin-top:8px;
}

</style>

</head>

<body>

<h1>AI Research Analytics Dashboard</h1>

<!-- ===== STAT CARDS ===== -->

<div class="stat-grid">

<div class="stat-card">
<h3>Total Participants</h3>
<p id="totalParticipants">0</p>
</div>

<div class="stat-card">
<h3>Unique Fields</h3>
<p id="uniqueFields">0</p>
</div>

<div class="stat-card">
<h3>AI Awareness</h3>
<p id="awarenessPercent">0%</p>
</div>

<div class="stat-card">
<h3>AI Interest</h3>
<p id="interestPercent">0%</p>
</div>

</div>

<!-- ===== CHARTS ===== -->

<div class="dashboard-grid">

<div class="chart-card">
<h3>Field of Study Distribution</h3>
<canvas id="fieldChart"></canvas>
</div>

<div class="chart-card">
<h3>Interest in AI</h3>
<canvas id="interestChart"></canvas>
</div>

<div class="chart-card">
<h3>AI Awareness</h3>
<canvas id="awarenessChart"></canvas>
</div>

</div>

<footer>

<p><strong>Powered by MGBDK — STEM & AI Research Initiative</strong></p>

<p>
Engineering • Biomedical • Robotics • Data Science • Physics
</p>

<img src="IMG-20251226-WA0008.jpg">

</footer>

<script>

async function loadAnalytics(){

const res = await fetch("/api/responses");

const data = await res.json();

/* ===== BASIC STATS ===== */

const total = data.length;

document.getElementById("totalParticipants").innerText = total;

/* ===== UNIQUE FIELDS ===== */

const fields = new Set();

data.forEach(r=>{
if(r.field) fields.add(r.field);
});

document.getElementById("uniqueFields").innerText = fields.size;

/* ===== AI AWARENESS ===== */

let awareCount = 0;

data.forEach(r=>{
if(r.ai_awareness === "Yes") awareCount++;
});

const awarenessPercent = Math.round((awareCount / total) * 100);

document.getElementById("awarenessPercent").innerText = awarenessPercent + "%";

/* ===== AI INTEREST ===== */

let interestCount = 0;

data.forEach(r=>{
if(r.ai_interest === "Very Interested" || r.ai_interest === "Interested"){
interestCount++;
}
});

const interestPercent = Math.round((interestCount / total) * 100);

document.getElementById("interestPercent").innerText = interestPercent + "%";

/* ===== FIELD DISTRIBUTION ===== */

const fieldCounts = {};

data.forEach(r=>{
const field = r.field || "Unknown";
fieldCounts[field] = (fieldCounts[field] || 0) + 1;
});

new Chart(document.getElementById("fieldChart"),{

type:"bar",

data:{
labels:Object.keys(fieldCounts),
datasets:[{
label:"Participants",
data:Object.values(fieldCounts)
}]
}

});

/* ===== AI INTEREST CHART ===== */

const interestCounts = {};

data.forEach(r=>{
const interest = r.ai_interest || "Unknown";
interestCounts[interest] = (interestCounts[interest] || 0) + 1;
});

new Chart(document.getElementById("interestChart"),{

type:"pie",

data:{
labels:Object.keys(interestCounts),
datasets:[{
data:Object.values(interestCounts)
}]
}

});

/* ===== AI AWARENESS CHART ===== */

const awarenessCounts = {};

data.forEach(r=>{
const aware = r.ai_awareness || "Unknown";
awarenessCounts[aware] = (awarenessCounts[aware] || 0) + 1;
});

new Chart(document.getElementById("awarenessChart"),{

type:"doughnut",

data:{
labels:Object.keys(awarenessCounts),
datasets:[{
data:Object.values(awarenessCounts)
}]
}

});

}

loadAnalytics();

</script>

</body>
</html>
