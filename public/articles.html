<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANARK Articles | Research Publications</title>

  <style>
    :root {
      --bg-dark: #0a0a0a;
      --bg-card: rgba(15, 15, 15, 0.94);
      --text-primary: #f0f0f0;
      --text-secondary: #d0d0d0;
      --gold: #c9a037;
      --gold-dark: #b8962e;
      --gold-glow: #d4af37;
      --border-dark: #2a2a2a;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, Arial, sans-serif;
      background: var(--bg-dark) url('anark_background.jpg') no-repeat center center fixed;
      background-size: cover;
      color: var(--text-primary);
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    body::before {
      content: ""; position: fixed; inset: 0;
      background: rgba(10, 10, 10, 0.78); z-index: -1;
    }

    nav {
      display: flex; justify-content: center; gap: 18px; flex-wrap: wrap;
      padding: 25px 20px; background: rgba(10,10,10,0.7);
      backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;
    }

    nav a {
      padding: 12px 28px; background: linear-gradient(45deg, var(--gold), #d4af37);
      color: #111; font-weight: 700; border-radius: 50px; text-decoration: none;
      transition: all 0.3s ease;
    }
    nav a:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 10px 25px rgba(201,160,55,0.5); }

    .container { max-width: 1180px; margin: 40px auto; padding: 0 20px; }

    /* ==================== FEATURED HERO ==================== */
    .featured-hero {
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://picsum.photos/id/1015/1200/600');
      background-size: cover; background-position: center;
      border-radius: 20px; padding: 80px 40px; margin-bottom: 70px;
      text-align: center; color: white; position: relative;
    }

    .featured-hero .tag {
      background: var(--gold); color: #111; padding: 8px 20px;
      border-radius: 30px; font-weight: 700; display: inline-block; margin-bottom: 20px;
    }

    .featured-hero h1 {
      font-size: clamp(2.4rem, 7vw, 3.6rem); margin: 0 0 20px 0; color: var(--gold);
    }

    .featured-hero p { max-width: 700px; margin: 0 auto 30px; font-size: 1.2rem; opacity: 0.95; }

    .btn-featured {
      background: var(--gold); color: #111; padding: 14px 32px; border: none;
      border-radius: 50px; font-weight: 700; font-size: 1.1rem; cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-featured:hover { transform: scale(1.08); box-shadow: 0 0 25px var(--gold-glow); }

    /* ==================== FILTERS ==================== */
    .filters {
      display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 50px;
    }

    .filter-btn {
      padding: 10px 22px; background: rgba(255,255,255,0.08); border: 1px solid var(--border-dark);
      border-radius: 50px; color: var(--text-secondary); cursor: pointer; transition: all 0.3s;
    }

    .filter-btn.active, .filter-btn:hover {
      background: var(--gold); color: #111; border-color: var(--gold);
    }

    .search-box {
      padding: 14px 24px; width: 380px; max-width: 100%; background: rgba(255,255,255,0.08);
      border: 1px solid var(--border-dark); border-radius: 50px; color: white; font-size: 1.05rem;
    }

    /* Articles Grid */
    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 32px;
    }

    .article-card {
      background: var(--bg-card); border: 1px solid var(--border-dark);
      border-radius: 16px; overflow: hidden; transition: all 0.5s ease;
      display: flex; flex-direction: column; height: 100%;
    }

    .article-card:hover {
      transform: translateY(-12px); border-color: var(--gold);
      box-shadow: 0 20px 40px rgba(201, 160, 55, 0.25);
    }

    .article-image {
      height: 220px; background-size: cover; background-position: center; position: relative;
    }

    .article-image::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(10,10,10,0.85), transparent);
    }

    .category {
      position: absolute; top: 16px; left: 16px; background: var(--gold); color: #111;
      font-size: 0.85rem; font-weight: 700; padding: 6px 14px; border-radius: 30px;
    }

    .article-content { padding: 24px; flex-grow: 1; display: flex; flex-direction: column; }

    .article-content h3 { margin: 0 0 14px 0; font-size: 1.45rem; line-height: 1.3; color: var(--gold); }

    .article-content p { color: var(--text-secondary); line-height: 1.65; flex-grow: 1; }

    .article-meta {
      margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border-dark);
      font-size: 0.95rem; color: var(--text-secondary); display: flex; justify-content: space-between;
    }

    .read-btn {
      margin-top: 20px; padding: 12px 28px; background: transparent; border: 2px solid var(--gold);
      color: var(--gold); font-weight: 600; border-radius: 50px; transition: all 0.3s ease;
    }
    .read-btn:hover { background: var(--gold); color: #111; }

    /* Submit Button */
    .submit-btn {
      position: fixed; bottom: 30px; right: 30px; background: var(--gold); color: #111;
      padding: 16px 24px; border-radius: 50px; font-weight: 700; box-shadow: 0 8px 25px rgba(201,160,55,0.4);
      display: flex; align-items: center; gap: 10px; cursor: pointer; z-index: 200;
      transition: all 0.3s ease;
    }
    .submit-btn:hover { transform: scale(1.1); }

    /* Modal */
    .modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      align-items: center; justify-content: center; z-index: 300;
    }

    .modal-content {
      background: #111; border: 1px solid var(--gold); border-radius: 16px;
      width: 90%; max-width: 600px; padding: 40px; position: relative;
    }

    .close { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: var(--gold); }

    footer { text-align: center; margin-top: 100px; padding: 40px 20px; opacity: 0.9; }
    .mgbdk-logo { width: 52px; margin: 20px auto 0; display: block; transition: all 0.4s ease; }
    .mgbdk-logo:hover { transform: scale(1.25); filter: drop-shadow(0 0 18px var(--gold)); }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="survey.html">Take Survey</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="articles.html">Articles</a>
</nav>

<div class="container">

  <!-- Featured Hero -->
  <div class="featured-hero" id="featuredHero">
    <!-- Dynamically filled by JS -->
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-category="all" onclick="filterByCategory(this)">All</button>
    <button class="filter-btn" data-category="AI & NLP" onclick="filterByCategory(this)">AI & NLP</button>
    <button class="filter-btn" data-category="Robotics" onclick="filterByCategory(this)">Robotics</button>
    <button class="filter-btn" data-category="Biomedical Engineering" onclick="filterByCategory(this)">Biomedical</button>
    <button class="filter-btn" data-category="Ethics & Policy" onclick="filterByCategory(this)">Ethics</button>
    <button class="filter-btn" data-category="Physics & Simulation" onclick="filterByCategory(this)">Physics</button>
  </div>

  <input type="text" class="search-box" id="searchInput" 
         placeholder="Search articles by title, author or topic..." onkeyup="filterArticles()">

  <!-- Articles Grid -->
  <div class="articles-grid" id="articlesGrid"></div>
</div>

<!-- Submit Article Button -->
<button class="submit-btn" onclick="showSubmitModal()">
  Submit Your Article
</button>

<!-- Submit Modal -->
<div class="modal" id="submitModal">
  <div class="modal-content">
    <span class="close" onclick="hideSubmitModal()">×</span>
    <h2 style="color:var(--gold); text-align:center; margin-bottom:30px;">Submit Your Research Article</h2>
    
    <form id="submitForm">
      <input type="text" placeholder="Article Title" required style="width:100%; padding:12px; margin-bottom:15px; background:#222; border:1px solid #444; border-radius:8px; color:white;">
      <input type="text" placeholder="Your Full Name" required style="width:100%; padding:12px; margin-bottom:15px; background:#222; border:1px solid #444; border-radius:8px; color:white;">
      <input type="email" placeholder="Email Address" required style="width:100%; padding:12px; margin-bottom:15px; background:#222; border:1px solid #444; border-radius:8px; color:white;">
      
      <select style="width:100%; padding:12px; margin-bottom:15px; background:#222; border:1px solid #444; border-radius:8px; color:white;">
        <option value="">Select Category</option>
        <option value="AI & NLP">AI & NLP</option>
        <option value="Robotics">Robotics</option>
        <option value="Biomedical Engineering">Biomedical Engineering</option>
        <option value="Ethics & Policy">Ethics & Policy</option>
        <option value="Physics & Simulation">Physics & Simulation</option>
      </select>

      <textarea placeholder="Brief Abstract / Excerpt (max 300 words)" rows="5" style="width:100%; padding:12px; background:#222; border:1px solid #444; border-radius:8px; color:white; resize:vertical;"></textarea>

      <button type="submit" style="width:100%; margin-top:20px; padding:14px; background:var(--gold); color:#111; border:none; border-radius:50px; font-weight:700; font-size:1.1rem;">
        Submit Article for Review
      </button>
    </form>
  </div>
</div>

<footer>
  <p><strong>Powered by MGBDK — STEM & AI Research Initiative</strong></p>
  <p>Engineering • Biomedical • Robotics • Data Science • Physics</p>
  <img src="MGBDK.PNG" class="mgbdk-logo" alt="MGBDK Logo">
</footer>

<script>
// Sample Articles Data (You can move this to articles.json later)
let allArticles = [
  { id:1, title:"Transformer Models for Low-Resource African Languages", category:"AI & NLP", image:"https://picsum.photos/id/1015/800/600", excerpt:"Novel fine-tuning approach improving translation accuracy by 47% for Yoruba and Igbo.", author:"Dr. Aisha Bello", authorTitle:"Lead AI Researcher, University of Lagos", date:"March 12, 2026", readTime:"18 min", featured:true },
  { id:2, title:"Autonomous Agricultural Drones for Food Security", category:"Robotics", image:"https://picsum.photos/id/201/800/600", excerpt:"Low-cost drones reducing pesticide usage by 60% in Sub-Saharan Africa.", author:"Engr. Olumide Adeyemi", authorTitle:"Robotics Engineer, ANARK Lab", date:"Feb 28, 2026", readTime:"14 min", featured:false },
  { id:3, title:"AI-Driven Early Malaria Detection Using Smartphone Microscopy", category:"Biomedical Engineering", image:"https://picsum.photos/id/237/800/600", excerpt:"96.4% accuracy model for rural healthcare settings.", author:"Dr. Fatima Nkosi", authorTitle:"Biomedical AI Specialist", date:"Feb 15, 2026", readTime:"22 min", featured:false },
  { id:4, title:"Ethical Frameworks for Responsible AI in Africa", category:"Ethics & Policy", image:"https://picsum.photos/id/870/800/600", excerpt:"Culturally grounded ethical framework for African AI development.", author:"Prof. Naledi Khumalo", authorTitle:"Professor of AI Ethics", date:"Jan 20, 2026", readTime:"25 min", featured:false }
];

// Render Featured Article
function renderFeatured() {
  const featured = allArticles.find(a => a.featured);
  if (!featured) return;

  document.getElementById("featuredHero").innerHTML = `
    <div class="tag">Featured Research</div>
    <h1>${featured.title}</h1>
    <p>${featured.excerpt}</p>
    <p><strong>By ${featured.author}</strong> • ${featured.date}</p>
    <button class="btn-featured" onclick="readArticle(${featured.id})">Read Full Paper</button>
  `;
}

// Render All Articles
function renderArticles(articles) {
  const grid = document.getElementById("articlesGrid");
  grid.innerHTML = "";

  articles.forEach(article => {
    const card = document.createElement("div");
    card.className = "article-card";
    card.innerHTML = `
      <div class="article-image" style="background-image: url('${article.image}')">
        <div class="category">${article.category}</div>
      </div>
      <div class="article-content">
        <h3>${article.title}</h3>
        <p>${article.excerpt}</p>
        <div class="article-meta">
          <div><strong>${article.author}</strong></div>
          <div style="text-align:right;">${article.date}<br><small>${article.readTime}</small></div>
        </div>
        <button class="read-btn" onclick="readArticle(${article.id})">Read Full Paper →</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

// Category Filter
function filterByCategory(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const category = btn.getAttribute('data-category');

  if (category === "all") {
    renderArticles(allArticles);
  } else {
    const filtered = allArticles.filter(a => a.category === category);
    renderArticles(filtered);
  }
}

// Search Filter
function filterArticles() {
  const term = document.getElementById("searchInput").value.toLowerCase().trim();
  const activeCategory = document.querySelector('.filter-btn.active').getAttribute('data-category');

  let filtered = allArticles;

  if (activeCategory !== "all") {
    filtered = filtered.filter(a => a.category === activeCategory);
  }

  if (term) {
    filtered = filtered.filter(a => 
      a.title.toLowerCase().includes(term) || 
      a.author.toLowerCase().includes(term) ||
      a.excerpt.toLowerCase().includes(term)
    );
  }

  renderArticles(filtered);
}

// Modal Functions
function showSubmitModal() {
  document.getElementById("submitModal").style.display = "flex";
}

function hideSubmitModal() {
  document.getElementById("submitModal").style.display = "none";
}

// Placeholder for reading article
function readArticle(id) {
  alert(`Opening Article ID: ${id}\n\n(In production, this would open the full paper or PDF.)`);
}

// Initialize Page
window.onload = () => {
  renderFeatured();
  renderArticles(allArticles);

  // Close modal when clicking outside
  document.getElementById("submitModal").addEventListener("click", function(e) {
    if (e.target === this) hideSubmitModal();
  });
};
</script>

</body>
</html>
