<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">ANARK Article</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/public/anark logo 1323.png">
  <style>
    :root {
      --bg-dark: #0a0a0a;
      --bg-card: rgba(15, 15, 15, 0.94);
      --text-primary: #f0f0f0;
      --text-secondary: #d0d0d0;
      --gold: #c9a037;
      --border-dark: #2a2a2a;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, Arial, sans-serif;
      background: var(--bg-dark) url('anark_background.jpg') no-repeat center center fixed;
      background-size: cover;
      color: var(--text-primary);
      margin: 0; padding: 0; min-height: 100vh;
      line-height: 1.8;
    }

    body::before {
      content: ""; position: fixed; inset: 0;
      background: rgba(10,10,10,0.82); z-index: -1;
    }

    nav {
      display: flex; justify-content: center; gap: 18px; flex-wrap: wrap;
      padding: 25px 20px; background: rgba(10,10,10,0.8);
      backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;
    }

    nav a {
      padding: 12px 28px; background: linear-gradient(45deg, var(--gold), #d4af37);
      color: #111; font-weight: 700; border-radius: 50px; text-decoration: none;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
      background: var(--bg-card);
      border: 1px solid var(--border-dark);
      border-radius: 20px;
      overflow: hidden;
    }

    .article-hero-image {
  width: 100%;
  height: 420px;
  background-size: cover;
  background-position: center;
  margin-bottom: 30px;
  border-radius: 16px 16px 0 0;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  position: relative;
}

.article-hero-image::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent, rgba(10,10,10,0.75));
  border-radius: 16px 16px 0 0;
}

    .article-header {
      padding: 40px 40px 30px;
      text-align: center;
    }

    .article-header .category {
      background: var(--gold); color: #111; padding: 8px 20px;
      border-radius: 30px; font-weight: 700; display: inline-block; margin-bottom: 20px;
    }

    .article-header h1 {
      font-size: 2.6rem;
      color: var(--gold);
      margin: 0 0 20px 0;
      line-height: 1.3;
    }

    .article-meta {
      color: var(--text-secondary);
      font-size: 1.05rem;
    }

    .article-body {
      padding: 50px 60px;
      font-size: 1.15rem;
      line-height: 1.85;
      color: var(--text-secondary);
    }

    .article-body h2 {
      color: var(--gold);
      margin-top: 50px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 30px 0 0 40px;
      padding: 10px 20px;
      background: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
    }

    footer {
      text-align: center;
      padding: 60px 20px 40px;
      opacity: 0.85;
    }

    .mgbdk-logo {
      width: 52px;
      margin: 20px auto 0;
      display: block;
      transition: all 0.4s ease;
    }
    .mgbdk-logo:hover {
      transform: scale(1.3) rotate(0deg);
      filter: drop-shadow(0 0 15px var(--gold));
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="survey.html">Take Survey</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="articles.html">Articles</a>
</nav>

<div class="container">
  <a href="articles.html" class="back-btn">← Back to All Articles</a>

  <!-- Image at the top -->
  <div class="article-hero-image" id="articleImage"></div>

  <div class="article-header">
    <div class="category" id="category"></div>
    <h1 id="title"></h1>
    <div class="article-meta" id="meta"></div>
  </div>

  <div class="article-body" id="content"></div>
</div>

<footer>
  <p><strong>Powered by MGBDK — STEM & AI Research Initiative</strong></p>
  <p>Engineering • Biomedical • Robotics • Data Science • Physics</p>
  <img src="MGBDK.PNG" class="mgbdk-logo" alt="MGBDK Logo">
</footer>

<script>
async function loadArticle() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));

  try {
    const res = await fetch("articles.json");
    const articles = await res.json();
    const article = articles.find(a => a.id === id);

    if (!article) {
      document.getElementById("content").innerHTML = "<h2 style='color:red; text-align:center;'>Article not found.</h2>";
      return;
    }

    // Fill the text content
    document.getElementById("pageTitle").textContent = article.title;
    document.getElementById("category").textContent = article.category;
    document.getElementById("title").textContent = article.title;
    document.getElementById("meta").innerHTML = `By ${article.author} • ${article.date} • ${article.readTime}`;
    document.getElementById("content").innerHTML = article.content;

    // Show the image - Simple and stable (no flashing)
    const imgDiv = document.getElementById("articleImage");
    if (article.image) {
      imgDiv.style.backgroundImage = `url('${article.image}')`;
    }

  } catch (err) {
    console.error("Failed to load article", err);
  }
}

window.onload = loadArticle;
</script>

</body>
</html>
